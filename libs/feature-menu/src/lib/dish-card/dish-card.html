<rp-card>
  <div class="media">
    @if (!imageFailed()) {
    <img
      [src]="dish().imageUrl"
      [alt]="dish().name"
      [class.is-loaded]="imageLoaded()"
      loading="lazy"
      (load)="onImageLoad()"
      (error)="onImageError()"
    />
    @if (!imageLoaded()) {
    <rp-spinner class="media-spinner"></rp-spinner>
    } } @else {
    <div class="media-fallback" aria-hidden="true">
      <svg
        viewBox="0 0 24 24"
        width="40"
        height="40"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <path d="m21 15-5-5L5 21" />
        <line x1="3" y1="21" x2="21" y2="3" />
      </svg>
    </div>
    } @if (!dish().isAvailable) {
    <span class="sold-out-badge">Sold out</span>
    }
  </div>

  <div class="body">
    <h3 class="name">{{ dish().name }}</h3>
    <p class="description">{{ dish().description }}</p>
    <div class="footer">
      <rp-price class="price" [value]="dish().price" />
      @if (dish().isAvailable) { @if (cartCount() === 0) {
      <button
        mat-flat-button
        color="primary"
        type="button"
        (click)="cart.add(dish())"
      >
        Add to cart
      </button>
      } @else {
      <div class="qty">
        <button
          mat-icon-button
          type="button"
          aria-label="Decrease quantity"
          (click)="cart.decrement(dish().id)"
        >
          <mat-icon fontSet="material-symbols-outlined">remove</mat-icon>
        </button>
        <span class="qty-count">{{ cartCount() }}</span>
        <button
          mat-icon-button
          type="button"
          aria-label="Increase quantity"
          (click)="cart.increment(dish().id)"
        >
          <mat-icon fontSet="material-symbols-outlined">add</mat-icon>
        </button>
      </div>
      } }
    </div>
  </div>
</rp-card>
