<div class="rp-main-layout">
  <header class="rp-header">
    <a
      class="rp-header__brand"
      routerLink="/menu"
      aria-label="Restaurant Platform — home"
    >
      <mat-icon class="rp-header__logo" fontSet="material-symbols-outlined"
        >dining</mat-icon
      >
      <span class="rp-header__title">Restaurant Platform</span>
    </a>

    <nav class="rp-header__actions" aria-label="User navigation">
      <button
        mat-icon-button
        type="button"
        [attr.aria-label]="auth.isAuthorized() ? 'User profile' : 'Sign in'"
      >
        <mat-icon fontSet="material-symbols-outlined">
          {{ auth.isAuthorized() ? 'account_circle' : 'person' }}
        </mat-icon>
      </button>

      <a
        mat-icon-button
        routerLink="/checkout"
        aria-label="Cart"
        [matBadge]="cart.totalCount()"
        [matBadgeHidden]="cart.isEmpty()"
        matBadgeColor="accent"
        matBadgeSize="small"
      >
        <mat-icon fontSet="material-symbols-outlined">shopping_cart</mat-icon>
      </a>
    </nav>
  </header>

  <main class="rp-main">
    <router-outlet />
  </main>

  <footer class="rp-footer">
    <span>Restaurant Platform</span>
    <span>Ksenya Arysheva</span>
    <span>{{ currentYear }}</span>
  </footer>
</div>
